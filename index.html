<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>料金シミュレーター</title>

<style>
body{
  font-family: sans-serif;
  padding:20px;
}

.option{
  display:block;
  margin:10px 0;
  font-size:16px;
}

.total{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>オプションを選択してください</h2>

<label class="option">
<input type="checkbox" value="1000" class="price">
オプションA（+1000円）
</label>

<label class="option">
<input type="checkbox" value="2000" class="price">
オプションB（+2000円）
</label>

<label class="option">
<input type="checkbox" value="500" class="price">
オプションC（+500円）
</label>

<div class="total">
合計：<span id="total">0</span>円
</div>

<script>

const prices = document.querySelectorAll(".price");
const total = document.getElementById("total");

function updateTotal(){

  let sum = 0;

  prices.forEach(function(item){
    if(item.checked){
      sum += Number(item.value);
    }
  });

  total.textContent = sum;

}

prices.forEach(function(item){
  item.addEventListener("change", updateTotal);
});

</script>

</body>
</html>
